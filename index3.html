<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery Grid</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <div class="gallery-container">
        <div class="gallery-column">
            <div class="gallery-item item-tall">
                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80" alt="Moody foggy beach and rock formation">
            </div>
            <div class="gallery-item item-short">
                <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80" alt="Minimalist white futuristic interior">
            </div>
        </div>

        <div class="gallery-column">
            <div class="gallery-item item-short">
                <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?auto=format&fit=crop&w=800&q=80" alt="Dinner table setting with soup">
            </div>
            <div class="gallery-item item-tall">
                <img src="https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=800&q=80" alt="Yellow wall with brown wooden door">
            </div>
        </div>

        <div class="gallery-column">
            <div class="gallery-item item-tall">
                <img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=800&q=80" alt="Multi-story sunlit apartment building">
            </div>
            <div class="gallery-item item-short">
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80" alt="Grassy sand dunes by the sea">
            </div>
        </div>
    </div>

</body>
</html>
